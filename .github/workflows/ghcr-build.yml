# =============================================================================
# MCP GHCR Build — Build Docker image and push to GitHub Container Registry
# =============================================================================
#
# Triggered on push to main or dev, and on manual dispatch.
# - main: pushes :latest and :sha-XXXXXXX tags
# - dev:  pushes :dev and :sha-XXXXXXX tags
#
# Watchtower on the Hetzner prod server polls GHCR every 6 hours and
# automatically restarts containers when a new :latest image is detected.
# No manual deploy step needed.
#
# DATABASE PROVISIONING:
# If the Dockerfile COPYs a .db file and that file is missing, empty, or an
# LFS pointer after checkout, this workflow downloads database.db.gz from the
# repo's latest GitHub Release. This handles two failure modes:
#   1. Repos using Git LFS where the runner lacks LFS (fallback to release)
#   2. Repos with data/*.db in .gitignore (placeholder only, real DB in release)
#
# PREREQUISITES:
# 1. Repository must have a Dockerfile at the root (or specify path)
# 2. GITHUB_TOKEN has automatic write:packages permission (no secrets needed)
# 3. For repos with gitignored/LFS databases: a GitHub Release with database.db.gz
#
# =============================================================================

name: Build and Push to GHCR

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: german-law-mcp

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Provision database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if Dockerfile copies any .db file
          DB_FILES=$(grep -oP 'COPY\s+\K(data/\S+\.db)' Dockerfile 2>/dev/null || true)
          if [ -z "$DB_FILES" ]; then
            echo "No .db files in Dockerfile COPY, skipping"
            exit 0
          fi

          for DB_FILE in $DB_FILES; do
            if [ -f "$DB_FILE" ] && [ "$(wc -c < "$DB_FILE")" -gt 1024 ]; then
              echo "OK: $DB_FILE is valid ($(du -sh "$DB_FILE" | cut -f1))"
              continue
            fi

            # Detect LFS pointer or empty file
            if [ -f "$DB_FILE" ]; then
              if head -1 "$DB_FILE" 2>/dev/null | grep -q 'version https://git-lfs'; then
                echo "WARN: $DB_FILE is an LFS pointer, not actual data"
              else
                echo "WARN: $DB_FILE exists but is empty or too small ($(wc -c < "$DB_FILE") bytes)"
              fi
            else
              echo "WARN: $DB_FILE does not exist"
            fi

            # Download from GitHub Releases
            TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
            if [ -z "$TAG" ]; then
              echo "ERROR: $DB_FILE invalid and no GitHub Release available"
              exit 1
            fi

            echo "Downloading *.db.gz from release $TAG..."
            mkdir -p data
            # Match any .db.gz asset; some MCPs publish database.db.gz, others publish <name>-free.db.gz
            if gh release download "$TAG" -p "*.db.gz" -D data/ 2>/dev/null; then
              for gz in data/*.db.gz; do
                [ -e "$gz" ] || continue
                gunzip -f "$gz"
              done
              # Normalize to data/database.db so the Dockerfile COPY succeeds regardless of asset naming
              if [ ! -f data/database.db ]; then
                first_db=$(ls data/*.db 2>/dev/null | head -1)
                [ -n "$first_db" ] && mv "$first_db" data/database.db
              fi
              if [ -f data/database.db ]; then
                echo "OK: $(du -sh data/database.db | cut -f1) from release $TAG"
              else
                echo "ERROR: archive downloaded but no .db file produced"
                exit 1
              fi
            else
              echo "ERROR: Could not download *.db.gz from release $TAG"
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          echo "## GHCR Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tags | $(echo '${{ steps.meta.outputs.tags }}' | tr '\n' ', ') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"

      - name: Trigger Watchtower update on prod
        if: success() && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
        run: |
          if [ -z "$WATCHTOWER_TOKEN" ]; then
            echo "WATCHTOWER_HTTP_API_TOKEN not set — skipping kick. Prod will swap on next hourly Watchtower poll."
            echo "To enable near-instant deploys, add this secret to the repo (value lives in /opt/ansvar/prod/mcp/watchtower/.env on the prod host)."
            exit 0
          fi
          echo "Kicking Watchtower /v1/update..."
          HTTP=$(curl -X POST -sS -o /tmp/watchtower-response \
            -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
            -w "%{http_code}" \
            https://watchtower.ansvar.eu/v1/update) || HTTP="000"
          echo "Response code: $HTTP"
          head -c 500 /tmp/watchtower-response 2>/dev/null || true
          echo
          if [ "$HTTP" = "200" ]; then
            echo "OK: Watchtower scan triggered — prod should swap container within seconds."
          else
            echo "WARN: Watchtower kick returned HTTP $HTTP. Hourly poll will swap eventually."
          fi
