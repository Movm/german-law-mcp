# =============================================================================
# Publish GHCR Image — Build, push, and scan container image
# =============================================================================
#
# Triggered on push to main when source, data, or Dockerfile changes.
# Builds and pushes to GHCR, then runs Trivy image scan (post-merge audit).
#
# GHCR auth uses GitHub's built-in GITHUB_TOKEN — no additional secrets needed.
#
# Trivy scans the just-built image for CRITICAL and HIGH CVEs.
# Results are uploaded to the GitHub Security tab as SARIF.
# This is a post-merge audit trail, not a merge gate (see spec §5.1.1).
#
# =============================================================================

name: Publish GHCR Image
on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'data/**'
      - 'scripts/**'
      - 'sources.yml'
      - 'server.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'Dockerfile'
      - '.dockerignore'
      # Include this workflow's own path so the PR that adds or modifies it
      # rebuilds :latest on its merge commit. Without this, a PR that only
      # touches .github/workflows/ (e.g. introducing this file) is excluded
      # by its own filter — the workflow exists on main but never runs, and
      # a separate "trigger" PR (e.g. a package.json bump) is needed to
      # actually publish. See public-procurement-mcp PR #13 for the incident.
      - '.github/workflows/publish-ghcr.yml'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read  # codeql-action/upload-sarif requires this on internal/private repos

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set image name from package.json
        id: meta
        run: |
          NAME=$(node -e "console.log(require('./package.json').name.replace('@ansvar/', ''))")
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "image_name=${NAME}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Provision database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DB_FILES=$(grep -oP 'COPY[^#]*\K(data/\S+\.db)\b' Dockerfile 2>/dev/null || true)
          if [ -z "$DB_FILES" ]; then
            echo "No .db files in Dockerfile COPY, skipping"
            exit 0
          fi

          for DB_FILE in $DB_FILES; do
            if [ -f "$DB_FILE" ] && [ "$(wc -c < "$DB_FILE")" -gt 1024 ]; then
              echo "OK: $DB_FILE is valid ($(du -sh "$DB_FILE" | cut -f1))"
              continue
            fi

            if [ -f "$DB_FILE" ]; then
              if head -1 "$DB_FILE" 2>/dev/null | grep -q 'version https://git-lfs'; then
                echo "WARN: $DB_FILE is an LFS pointer, not actual data"
              else
                echo "WARN: $DB_FILE exists but is empty or too small ($(wc -c < "$DB_FILE") bytes)"
              fi
            else
              echo "WARN: $DB_FILE does not exist"
            fi

            TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
            if [ -z "$TAG" ]; then
              echo "ERROR: $DB_FILE invalid and no GitHub Release available"
              exit 1
            fi

            echo "Downloading *.db.gz from release $TAG..."
            mkdir -p data
            if gh release download "$TAG" -p "*.db.gz" -D data/ 2>/dev/null; then
              for gz in data/*.db.gz; do
                [ -e "$gz" ] || continue
                gunzip -f "$gz"
              done
              if [ ! -f data/database.db ]; then
                first_db=$(ls data/*.db 2>/dev/null | head -1)
                [ -n "$first_db" ] && mv "$first_db" data/database.db
              fi
              if [ -f data/database.db ]; then
                echo "OK: $(du -sh data/database.db | cut -f1) from release $TAG"
              else
                echo "ERROR: archive downloaded but no .db file produced"
                exit 1
              fi
            else
              echo "ERROR: Could not download *.db.gz from release $TAG"
              exit 1
            fi
          done

      - name: Set up Docker Buildx
        # Required for `cache-to: type=gha` — the default `docker` driver
        # does not support cache export. Use the docker-container driver via
        # buildx so the GitHub Actions cache backend works.
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/ansvar-systems/${{ steps.meta.outputs.image_name }}:${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}
            ${{ env.REGISTRY }}/ansvar-systems/${{ steps.meta.outputs.image_name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/ansvar-systems/${{ steps.meta.outputs.image_name }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true  # Code Security must be enabled on the repo for upload to succeed; non-fatal per workflow header (post-merge audit trail, not a merge gate)
        with:
          sarif_file: trivy-results.sarif

      - name: Trigger Watchtower update on prod
        if: success() && github.ref == 'refs/heads/main'
        continue-on-error: true
        env:
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
        run: |
          if [ -z "$WATCHTOWER_TOKEN" ]; then
            echo "WATCHTOWER_HTTP_API_TOKEN not set — skipping kick. Prod will swap on next hourly Watchtower poll."
            exit 0
          fi
          echo "Kicking Watchtower /v1/update..."
          HTTP=$(curl -X POST -sS -o /tmp/watchtower-response \
            -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
            -w "%{http_code}" \
            https://watchtower.ansvar.eu/v1/update) || HTTP="000"
          echo "Response code: $HTTP"
          head -c 500 /tmp/watchtower-response 2>/dev/null || true
          echo
          if [ "$HTTP" = "200" ]; then
            echo "OK: Watchtower scan triggered — prod should swap container within seconds."
          else
            echo "WARN: Watchtower kick returned HTTP $HTTP — falling back to hourly poll."
          fi
