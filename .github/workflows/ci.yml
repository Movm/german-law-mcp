name: CI
on:
  push:
    branches: [main, dev]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Detect expensive-change scope
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base"
            changed="$(git diff --name-only "$base" HEAD)"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            before="${{ github.event.before }}"
            git fetch --no-tags --depth=1 origin "$before" || true
            changed="$(git diff --name-only "$before" HEAD || git diff --name-only HEAD~1 HEAD || true)"
          else
            changed="$(git diff --name-only HEAD~1 HEAD || true)"
          fi

          printf '%s\n' "$changed"

          if printf '%s\n' "$changed" | grep -Eq '^(data/|sources\.ya?ml|coverage\.json|COVERAGE\.md|scripts/(ingest|build|premium-ingestion)|src/(db|data|ingest|schema)/|src/.*(db|data|ingest|schema)|package(-lock)?\.json|tsconfig\.json)'; then
            echo "db_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "db_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$changed" | grep -Eq '^(package(-lock)?\.json)$'; then
            echo "deps_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "deps_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Build database
        run: |
          if jq -e '.scripts["build:db"]' package.json >/dev/null 2>&1; then
            if [ "${{ steps.changes.outputs.db_changed }}" = "true" ]; then
              npm run build:db
            else
              echo "No data/ingestion/schema change detected — skipping build:db"
            fi
          else
            echo "build:db script not present — skipping (native-curated MCP without DB build step)"
          fi

      - name: Type check
        run: |
          if jq -e '.scripts.typecheck' package.json >/dev/null 2>&1; then
            npm run typecheck
          else
            echo "typecheck script not present — skipping"
          fi

      - name: Unit tests
        run: |
          if jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            # vitest exits 1 on "No test files found"; treat as N/A rather than failure.
            # An MCP with a `test` script but no test files is undertested but not broken.
            OUTPUT=$(npm test 2>&1) && EC=0 || EC=$?
            echo "$OUTPUT"
            if [ $EC -ne 0 ] && echo "$OUTPUT" | grep -q "No test files found"; then
              echo "::warning::no test files in repo — treating as N/A"
              exit 0
            fi
            exit $EC
          else
            echo "test script not present — skipping (no unit tests in this MCP)"
          fi

      - name: Contract tests
        run: |
          if jq -e '.scripts["test:contract"]' package.json >/dev/null 2>&1; then
            OUTPUT=$(npm run test:contract 2>&1) && EC=0 || EC=$?
            echo "$OUTPUT"
            if [ $EC -ne 0 ] && echo "$OUTPUT" | grep -q "No test files found"; then
              echo "::warning::no contract test files in repo — treating as N/A"
              exit 0
            fi
            exit $EC
          else
            echo "test:contract script not present — skipping"
          fi

      - name: Database integrity
        run: |
          # Detect DB path from build:db script; fall back to default.
          DB_PATH=$(jq -r '.scripts["build:db"] // empty' package.json | grep -oE 'data/[a-zA-Z0-9_-]+\.db' | head -1)
          DB_PATH=${DB_PATH:-data/database.db}
          if [ -f "$DB_PATH" ]; then
            # integrity_check is the meaningful correctness check.
            # journal_mode is a deployment-hygiene preference; some MCPs ship WAL mode
            # (e.g. for read-write at runtime), so don't assert delete.
            sqlite3 "$DB_PATH" "PRAGMA integrity_check;" | grep -q "ok"
          else
            echo "no database file at $DB_PATH — skipping integrity check"
          fi

      - name: Coverage consistency
        run: |
          if jq -e '.scripts["coverage:verify"]' package.json >/dev/null 2>&1; then
            # coverage:verify needs BOTH a built DB AND coverage.json to do
            # anything meaningful. Gate on:
            #   * DB exists and is >1024 bytes (release-pattern MCPs ship a
            #     0-byte stub; auto-ingested MCPs may not produce a DB in CI
            #     when the change set didn't trigger build:db).
            #   * coverage.json exists (the `coverage:update` script produces
            #     it; we don't run that in CI, so an MCP that doesn't commit
            #     a coverage snapshot has nothing to verify against).
            DB_PATH=$(jq -r '.scripts["build:db"] // empty' package.json | grep -oE 'data/[a-zA-Z0-9_-]+\.db' | head -1)
            DB_PATH=${DB_PATH:-data/database.db}
            if [ -f "$DB_PATH" ] && [ "$(wc -c < "$DB_PATH")" -gt 1024 ] && [ -f coverage.json ]; then
              npm run coverage:verify
            else
              echo "coverage:verify present but no usable DB+coverage.json pair — skipping (DB at $DB_PATH and/or coverage.json missing)"
            fi
          else
            echo "coverage:verify script not present — skipping"
          fi

      - name: Audit dependencies
        run: |
          if [ "${{ steps.changes.outputs.deps_changed }}" = "true" ]; then
            npm audit --audit-level=high || true
          else
            echo "package files unchanged — skipping npm audit (Dependabot/GHAS handle drift)"
          fi
